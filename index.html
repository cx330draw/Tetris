<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>三角洲俄羅斯方塊</title>
    <style>
      :root {
        --cell-size: 32px;
        --gap: 4px;
        --cols: 12;
        --rows: 20;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
        color: #f5f7ff;
        background:
          radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.35) 1px, transparent 2px) 0 0 / 36px 36px,
          radial-gradient(circle at 80% 30%, rgba(255, 255, 255, 0.3) 1px, transparent 2px) 0 0 / 44px 44px,
          linear-gradient(170deg, #151833 0%, #2b2950 60%, #3b2e59 100%);
        display: grid;
        place-items: center;
        padding: 16px;
      }

      .game-shell {
        width: min(1200px, 100%);
        display: grid;
        grid-template-columns: 320px 1fr;
        gap: 18px;
        align-items: start;
      }

      .panel {
        background: rgba(11, 14, 35, 0.62);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 16px;
        padding: 16px;
      }

      .panel h2 { margin: 0 0 12px; font-size: 1.15rem; }

      .pieces { display: grid; gap: 10px; }

      .piece-btn {
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.08);
        color: #fff;
        padding: 10px;
        cursor: grab;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .piece-btn.active {
        outline: 2px solid #fff;
        transform: translateX(2px);
      }

      .piece-meta { display: flex; flex-direction: column; gap: 4px; text-align: left; }
      .piece-name { font-weight: 700; }
      .piece-hint { opacity: 0.8; font-size: 0.8rem; }

      .mini-preview {
        --mini: 10px;
        display: grid;
        gap: 2px;
        justify-content: end;
      }

      .mini-cell {
        width: var(--mini);
        height: var(--mini);
        border-radius: 2px;
      }

      .board-area { position: relative; }

      .score {
        position: absolute;
        top: 0;
        right: 0;
        background: rgba(17, 23, 55, 0.85);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 12px;
        padding: 10px 14px;
        font-size: 1.1rem;
        font-weight: 700;
      }

      .board {
        margin-top: 58px;
        display: grid;
        grid-template-columns: repeat(var(--cols), var(--cell-size));
        grid-template-rows: repeat(var(--rows), var(--cell-size));
        gap: var(--gap);
        padding: 14px;
        width: fit-content;
        background: rgba(17, 15, 38, 0.45);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 18px;
        user-select: none;
      }

      .cell {
        width: var(--cell-size);
        height: var(--cell-size);
        border-radius: 6px;
        border: 1px solid rgba(255, 255, 255, 0.13);
        background: rgba(255, 255, 255, 0.04);
      }

      .cell.filled { box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.26); }

      .cell.preview-ok {
        outline: 2px dashed rgba(133, 255, 168, 0.95);
        outline-offset: -2px;
        background: rgba(90, 247, 142, 0.22);
      }

      .cell.preview-bad {
        outline: 2px dashed rgba(255, 125, 125, 0.95);
        outline-offset: -2px;
        background: rgba(255, 94, 94, 0.2);
      }

      .drag-ghost {
        position: fixed;
        pointer-events: none;
        border: 2px dashed rgba(255, 255, 255, 0.9);
        border-radius: 8px;
        opacity: 0.75;
        z-index: 99;
      }

      .tips { margin-top: 14px; color: rgba(239,243,255,.9); font-size: .92rem; line-height: 1.5; }

      @media (max-width: 980px) {
        .game-shell { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main class="game-shell">
      <section class="panel">
        <h2>方塊選項（左側）</h2>
        <div class="pieces" id="pieces"></div>
        <p class="tips">
          先點選方塊，再從左側方塊欄位按住拖拉到棋盤放置。<br />
          拖拉時會用虛線預覽落點，放開滑鼠即可填空。<br />
          每消除一條橫線可得 5 分。
        </p>
      </section>

      <section class="board-area">
        <div class="score">得分：<span id="score">0</span></div>
        <div class="board" id="board"></div>
      </section>
    </main>

    <script>
      const rows = 20;
      const cols = 12;
      const boardEl = document.getElementById("board");
      const piecesEl = document.getElementById("pieces");
      const scoreEl = document.getElementById("score");

      const pieceOptions = [
        { name: "1x1", h: 1, w: 1, color: "#fff374" },
        { name: "1x2", h: 1, w: 2, color: "#4CC9F0" },
        { name: "2x1", h: 2, w: 1, color: "#4361EE" },
        { name: "2x2", h: 2, w: 2, color: "#FFFFFF" },
        { name: "1x3", h: 1, w: 3, color: "#eebb85" },
        { name: "3x1", h: 3, w: 1, color: "#c89d6f" },
        { name: "2x3", h: 2, w: 3, color: "#7209B7" },
        { name: "3x2", h: 3, w: 2, color: "#B5179E" },
        { name: "3x3", h: 3, w: 3, color: "#86fd96" },
        { name: "1x4", h: 1, w: 4, color: "#393939" },
        { name: "4x1", h: 4, w: 1, color: "#858585" },
        { name: "3x4", h: 3, w: 4, color: "#F77F00" },
        { name: "4x3", h: 4, w: 3, color: "#E63946" }
      ];

      // 保留最初障礙物樣式，整體下移到底部區域
      const baseObstacleCells = [
        [2, 0], [4, 0], [5, 0], [6, 0],
        [4, 1], [5, 1], [6, 1],
        [4, 3], [5, 3], [6, 3],
        [0, 5], [1, 5], [2, 5], [3, 5], [4, 5], [5, 5], [6, 5],
        [4, 4], [4, 6], [5, 6], [6, 6],
        [5, 7], [6, 7],
        [4, 8], [5, 8], [6, 8],
        [3, 9], [4, 9], [5, 9], [6, 9],
        [2, 10], [3, 10], [4, 10], [5, 10], [6, 10],
        [1, 11], [2, 11], [3, 11], [4, 11], [5, 11], [6, 11]
      ];
      const obstacleOffset = rows - 7;
      const obstacleCells = baseObstacleCells.map(([r, c]) => [r + obstacleOffset, c]);

      const board = Array.from({ length: rows }, () => Array(cols).fill(null));
      let selected = pieceOptions[0];
      let score = 0;
      let isDraggingFromPalette = false;
      let hoverAnchor = null;
      let dragGhost = null;
      let dragPiece = null;

      function initObstacles() {
        for (const [r, c] of obstacleCells) {
          if (r >= 0 && r < rows && c >= 0 && c < cols) {
            board[r][c] = { color: "#D96A86", obstacle: true };
          }
        }

        // 依需求追加／調整指定障礙物（使用 1-based 描述轉為 0-based 索引）
        board[18][4] = { color: "#D96A86", obstacle: true }; // 第五欄第19列
        board[19][4] = { color: "#D96A86", obstacle: true }; // 第五欄第20列
        board[16][0] = { color: "#D96A86", obstacle: true }; // 第一欄第17列
        board[15][0] = null; // 第一欄第16列清除障礙物
      }

      function createMiniPreview(piece) {
        const mini = document.createElement("div");
        mini.className = "mini-preview";
        mini.style.gridTemplateColumns = `repeat(${piece.w}, 10px)`;
        mini.style.gridTemplateRows = `repeat(${piece.h}, 10px)`;

        for (let i = 0; i < piece.w * piece.h; i++) {
          const dot = document.createElement("span");
          dot.className = "mini-cell";
          dot.style.background = piece.color;
          mini.appendChild(dot);
        }

        return mini;
      }

      function selectPiece(piece, button) {
        selected = piece;
        document.querySelectorAll(".piece-btn").forEach((b) => b.classList.remove("active"));
        if (button) button.classList.add("active");
      }

      function buildPieceButtons() {
        pieceOptions.forEach((piece, index) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = `piece-btn${index === 0 ? " active" : ""}`;

          const meta = document.createElement("div");
          meta.className = "piece-meta";
          meta.innerHTML = `<span class="piece-name">${piece.name}</span><span class="piece-hint">點選後可拖拉放置</span>`;
          btn.append(meta, createMiniPreview(piece));

          btn.addEventListener("click", () => selectPiece(piece, btn));
          btn.addEventListener("mousedown", (event) => {
            event.preventDefault();
            selectPiece(piece, btn);
            startPaletteDrag(piece, event.clientX, event.clientY);
          });

          piecesEl.appendChild(btn);
        });
      }

      function renderBoard() {
        boardEl.innerHTML = "";
        for (let r = 0; r < rows; r++) {
          for (let c = 0; c < cols; c++) {
            const cell = document.createElement("div");
            cell.className = "cell";
            cell.dataset.row = String(r);
            cell.dataset.col = String(c);
            const value = board[r][c];
            if (value) {
              cell.classList.add("filled");
              cell.style.background = value.color;
            }
            boardEl.appendChild(cell);
          }
        }
      }

      function cellsForPiece(startR, startC, piece) {
        const cells = [];
        for (let r = startR; r < startR + piece.h; r++) {
          for (let c = startC; c < startC + piece.w; c++) {
            cells.push([r, c]);
          }
        }
        return cells;
      }

      function canPlace(startR, startC, piece) {
        if (startR + piece.h > rows || startC + piece.w > cols) return false;
        for (const [r, c] of cellsForPiece(startR, startC, piece)) {
          if (board[r][c]) return false;
        }
        return true;
      }

      function clearPreview() {
        boardEl.querySelectorAll(".preview-ok, .preview-bad").forEach((cell) => {
          cell.classList.remove("preview-ok", "preview-bad");
        });
      }

      function drawPreview(anchorR, anchorC, piece) {
        clearPreview();
        hoverAnchor = { r: anchorR, c: anchorC };
        const ok = canPlace(anchorR, anchorC, piece);
        const className = ok ? "preview-ok" : "preview-bad";

        for (const [r, c] of cellsForPiece(anchorR, anchorC, piece)) {
          if (r < 0 || c < 0 || r >= rows || c >= cols) continue;
          const el = boardEl.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);
          if (el) el.classList.add(className);
        }
      }

      function clearLines() {
        let cleared = 0;
        for (let r = rows - 1; r >= 0; r--) {
          const full = board[r].every((cell) => cell !== null);
          if (full) {
            board.splice(r, 1);
            board.unshift(Array(cols).fill(null));
            cleared++;
            r++;
          }
        }
        if (cleared > 0) {
          score += cleared * 5;
          scoreEl.textContent = String(score);
        }
      }

      function placePiece(anchorR, anchorC, piece) {
        if (!canPlace(anchorR, anchorC, piece)) return false;
        for (const [r, c] of cellsForPiece(anchorR, anchorC, piece)) {
          board[r][c] = { color: piece.color, obstacle: false };
        }
        clearLines();
        renderBoard();
        return true;
      }

      function createGhost(piece) {
        const ghost = document.createElement("div");
        ghost.className = "drag-ghost";
        const size = getComputedStyle(document.documentElement).getPropertyValue("--cell-size").trim();
        ghost.style.width = `calc(${piece.w} * ${size} + ${(piece.w - 1) * 4}px)`;
        ghost.style.height = `calc(${piece.h} * ${size} + ${(piece.h - 1) * 4}px)`;
        ghost.style.background = `${piece.color}55`;
        document.body.appendChild(ghost);
        return ghost;
      }

      function moveGhost(x, y) {
        if (!dragGhost) return;
        dragGhost.style.left = `${x + 10}px`;
        dragGhost.style.top = `${y + 10}px`;
      }

      function startPaletteDrag(piece, x, y) {
        isDraggingFromPalette = true;
        dragPiece = piece;
        dragGhost = createGhost(piece);
        moveGhost(x, y);
      }

      function getBoardPosFromPointer(x, y) {
        const target = document.elementFromPoint(x, y);
        const cell = target?.closest?.(".cell");
        if (!cell || !boardEl.contains(cell)) return null;
        return { r: Number(cell.dataset.row), c: Number(cell.dataset.col) };
      }

      document.addEventListener("mousemove", (event) => {
        if (!isDraggingFromPalette || !dragPiece) return;
        moveGhost(event.clientX, event.clientY);

        const pos = getBoardPosFromPointer(event.clientX, event.clientY);
        if (pos) {
          drawPreview(pos.r, pos.c, dragPiece);
        } else {
          hoverAnchor = null;
          clearPreview();
        }
      });

      document.addEventListener("mouseup", (event) => {
        if (!isDraggingFromPalette || !dragPiece) return;

        const pos = getBoardPosFromPointer(event.clientX, event.clientY);
        if (pos) placePiece(pos.r, pos.c, dragPiece);

        if (dragGhost) dragGhost.remove();
        dragGhost = null;
        dragPiece = null;
        isDraggingFromPalette = false;
        hoverAnchor = null;
        clearPreview();
      });

      initObstacles();
      buildPieceButtons();
      renderBoard();
    </script>
  </body>
</html>
